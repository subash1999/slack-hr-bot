name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploy
        run: npm test

      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json
          echo '{"scriptId":"${{ vars.APPS_SCRIPT_ID }}","rootDir":"dist","scriptExtensions":[".js",".gs"],"jsonExtensions":[".json"],"filePushOrder":[],"skipSubdirectories":false}' > .clasp.json

      - name: Bundle for GAS
        run: npm run build:gas

      - name: Push to Apps Script
        run: npx clasp push --force

      - name: Deploy as Web App
        run: npx clasp deploy --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
